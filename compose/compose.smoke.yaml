services:
  postgres:
    image: postgres:17
    container_name: homelabsec-smoke-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: homelabsec
      POSTGRES_USER: homelabsec
      POSTGRES_PASSWORD: change-me
    volumes:
      - smoke-pgdata:/var/lib/postgresql/data
      - ../brain/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homelabsec -d homelabsec"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "15432:5432"

  brain:
    image: python:3.12-slim
    container_name: homelabsec-smoke-brain
    restart: unless-stopped
    working_dir: /app
    command: >
      sh -c "pip install --no-cache-dir fastapi uvicorn psycopg[binary] pydantic requests lxml &&
             uvicorn app:app --host 0.0.0.0 --port 8088"
    environment:
      DATABASE_URL: postgresql://homelabsec:change-me@postgres:5432/homelabsec
      OLLAMA_URL: http://host.containers.internal:11434
      OLLAMA_MODEL: homelabsec-classifier
    extra_hosts:
      - "host.containers.internal:host-gateway"
    volumes:
      - ../brain:/app
      - ../discovery:/data/discovery
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8088/health')\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "18088:8088"

  scheduler:
    build: ../scheduler
    container_name: homelabsec-smoke-scheduler
    restart: unless-stopped
    environment:
      API_BASE: http://127.0.0.1:18088
      TARGET_SUBNET: ${TARGET_SUBNET:-10.0.0.0/24}
      DISCOVERY_INTERVAL_MINUTES: ${DISCOVERY_INTERVAL_MINUTES:-30}
      REPORT_HOUR_UTC: ${REPORT_HOUR_UTC:-8}
      DISCOVERY_DIR: /data/discovery/raw
      TOP_PORTS: ${TOP_PORTS:-100}
    depends_on:
      brain:
        condition: service_healthy
    network_mode: "host"
    volumes:
      - ../discovery:/data/discovery
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import os, requests; requests.get(os.environ.get('API_BASE', 'http://127.0.0.1:18088') + '/health', timeout=5).raise_for_status()\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build: ../frontend
    container_name: homelabsec-smoke-frontend
    restart: unless-stopped
    depends_on:
      brain:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    ports:
      - "18080:80"

volumes:
  smoke-pgdata:

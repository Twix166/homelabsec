services:
  prometheus:
    image: prom/prometheus:v3.7.1
    container_name: homelabsec-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-lifecycle
      - --storage.tsdb.path=/prometheus
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../monitoring/prometheus-rules.yml:/etc/prometheus/prometheus-rules.yml:ro
      - prometheus-data:/prometheus
    extra_hosts:
      - "host.containers.internal:host-gateway"
    ports:
      - "127.0.0.1:${PROMETHEUS_HOST_PORT:-9090}:9090"
    depends_on:
      brain:
        condition: service_healthy

  grafana:
    image: grafana/grafana:12.2.0
    container_name: homelabsec-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change-me-now}
    volumes:
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "127.0.0.1:${GRAFANA_HOST_PORT:-3001}:3000"
    depends_on:
      prometheus:
        condition: service_started

volumes:
  prometheus-data:
  grafana-data:

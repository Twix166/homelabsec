services:
  prometheus:
    image: prom/prometheus:v3.7.1
    container_name: homelabsec-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-lifecycle
      - --storage.tsdb.path=/prometheus
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../monitoring/prometheus-rules.yml:/etc/prometheus/prometheus-rules.yml:ro
      - prometheus-data:/prometheus
    extra_hosts:
      - "host.containers.internal:host-gateway"
    ports:
      - "127.0.0.1:${PROMETHEUS_HOST_PORT:-9090}:9090"
    depends_on:
      alertmanager:
        condition: service_started
      brain:
        condition: service_healthy

  alertmanager:
    build: ../monitoring/alertmanager
    container_name: homelabsec-alertmanager
    restart: unless-stopped
    environment:
      ALERTMANAGER_DEFAULT_RECEIVER: ${ALERTMANAGER_DEFAULT_RECEIVER:-null}
      ALERTMANAGER_WEBHOOK_URL: ${ALERTMANAGER_WEBHOOK_URL:-}
      ALERTMANAGER_EMAIL_TO: ${ALERTMANAGER_EMAIL_TO:-}
      ALERTMANAGER_EMAIL_FROM: ${ALERTMANAGER_EMAIL_FROM:-}
      ALERTMANAGER_SMARTHOST: ${ALERTMANAGER_SMARTHOST:-}
      ALERTMANAGER_SMTP_AUTH_USERNAME: ${ALERTMANAGER_SMTP_AUTH_USERNAME:-}
      ALERTMANAGER_SMTP_AUTH_PASSWORD: ${ALERTMANAGER_SMTP_AUTH_PASSWORD:-}
      ALERTMANAGER_SMTP_REQUIRE_TLS: ${ALERTMANAGER_SMTP_REQUIRE_TLS:-true}
    ports:
      - "127.0.0.1:${ALERTMANAGER_HOST_PORT:-9093}:9093"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:9093/-/healthy || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  grafana:
    image: grafana/grafana:12.2.0
    container_name: homelabsec-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change-me-now}
    volumes:
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "127.0.0.1:${GRAFANA_HOST_PORT:-3001}:3000"
    depends_on:
      prometheus:
        condition: service_started

volumes:
  prometheus-data:
  grafana-data:

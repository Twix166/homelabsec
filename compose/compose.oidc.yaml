services:
  edge:
    environment:
      EDGE_AUTH_MODE: oauth2_proxy
    depends_on:
      oauth2-proxy:
        condition: service_started

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
    container_name: homelabsec-oauth2-proxy
    restart: unless-stopped
    environment:
      OAUTH2_PROXY_PROVIDER: ${EDGE_OIDC_PROVIDER:-oidc}
      OAUTH2_PROXY_OIDC_ISSUER_URL: ${EDGE_OIDC_ISSUER_URL:?EDGE_OIDC_ISSUER_URL is required}
      OAUTH2_PROXY_CLIENT_ID: ${EDGE_OIDC_CLIENT_ID:?EDGE_OIDC_CLIENT_ID is required}
      OAUTH2_PROXY_CLIENT_SECRET: ${EDGE_OIDC_CLIENT_SECRET:?EDGE_OIDC_CLIENT_SECRET is required}
      OAUTH2_PROXY_COOKIE_SECRET: ${EDGE_OIDC_COOKIE_SECRET:?EDGE_OIDC_COOKIE_SECRET is required}
      OAUTH2_PROXY_REDIRECT_URL: ${EDGE_OIDC_REDIRECT_URL:?EDGE_OIDC_REDIRECT_URL is required}
      OAUTH2_PROXY_EMAIL_DOMAINS: ${EDGE_OIDC_EMAIL_DOMAINS:-*}
      OAUTH2_PROXY_HTTP_ADDRESS: 0.0.0.0:4180
      OAUTH2_PROXY_UPSTREAMS: static://202
      OAUTH2_PROXY_REVERSE_PROXY: "true"
      OAUTH2_PROXY_SET_XAUTHREQUEST: "true"
      OAUTH2_PROXY_COOKIE_SECURE: "true"
      OAUTH2_PROXY_COOKIE_CSRF_PER_REQUEST: "true"
      OAUTH2_PROXY_PASS_ACCESS_TOKEN: "false"
      OAUTH2_PROXY_PASS_AUTHORIZATION_HEADER: "false"
      OAUTH2_PROXY_SCOPE: ${EDGE_OIDC_SCOPE:-openid email profile}
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "true"
      OAUTH2_PROXY_SILENCE_PING_LOGGING: "true"
      OAUTH2_PROXY_WHITELIST_DOMAINS: ${EDGE_OIDC_WHITELIST_DOMAINS:-}

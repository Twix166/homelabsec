<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HomelabSec Profile</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="hero">
        <div>
          <p class="eyebrow">HomelabSec</p>
          <h1>Edit profile</h1>
          <p class="lede">Update your display name, email, and password.</p>
        </div>
        <div class="hero-side">
          <div id="page-nav"></div>
          <div id="profile-menu"></div>
        </div>
      </header>

      <main class="layout">
        <section class="panel panel-wide">
          <div class="section-heading">
            <h2>Profile</h2>
          </div>
          <form id="profile-form" class="auth-form">
            <label>
              <span>Display name</span>
              <input id="profile-display-name" type="text" required />
            </label>
            <label>
              <span>Email</span>
              <input id="profile-email" type="email" />
            </label>
            <label>
              <span>Current password</span>
              <input id="profile-current-password" type="password" autocomplete="current-password" />
            </label>
            <label>
              <span>New password</span>
              <input id="profile-new-password" type="password" autocomplete="new-password" />
            </label>
            <button id="profile-submit" class="refresh-button" type="submit">Save profile</button>
          </form>
          <div id="profile-message" class="empty-state auth-success" hidden></div>
        </section>
      </main>
    </div>
    <script src="/auth.js"></script>
    <script src="/profile.js"></script>
  </body>
</html>

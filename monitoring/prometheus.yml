global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: homelabsec-brain
    metrics_path: /metrics
    static_configs:
      - targets: ["brain:8088"]

  - job_name: homelabsec-scheduler
    metrics_path: /metrics
    static_configs:
      - targets: ["host.containers.internal:9100"]

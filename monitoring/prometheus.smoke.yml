global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/prometheus-rules.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: homelabsec-brain
    metrics_path: /metrics
    static_configs:
      - targets: ["brain:8088"]

  - job_name: homelabsec-scheduler
    metrics_path: /metrics
    static_configs:
      - targets: ["host.containers.internal:19100"]
